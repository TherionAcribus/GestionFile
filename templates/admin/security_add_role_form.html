<div class="card">
    <div class="card-body">
        <h5 class="card-title">Nouveau rôle</h5>
        <div class="mb-3">
            <label for="name" class="form-label">Nom</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <input type="text" class="form-control" id="description" name="description">
        </div>

        <div class="mb-3">
            <label class="form-label">Permissions</label>
            {# Cases générées depuis le registre de permissions (source de vérité
               unique) : plus aucune liste codée en dur ici. #}
            {% for category, permissions in permissions_by_category.items() %}
            <fieldset class="mb-3">
                <legend class="col-form-label fw-semibold pt-0">{{ category }}</legend>
                <div class="row">
                    {% for perm in permissions %}
                    <div class="col-md-4">
                        <div class="mb-2">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input permission-checkbox"
                                    id="{{ perm.field }}" data-permission="{{ perm.field }}">
                                <label class="form-check-label" for="{{ perm.field }}"
                                    title="{{ perm.description }}">
                                    {{ perm.label }}
                                </label>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </fieldset>
            {% endfor %}
        </div>

        <button class="btn btn-primary"
            hx-post="/admin/security/save_role"
            hx-target="#div_role_table"
            hx-swap="innerHTML"
            hx-vals='js:{
                "name": document.getElementById("name").value,
                "description": document.getElementById("description").value,
                "permissions": JSON.stringify(
                    Object.fromEntries(
                        Array.from(document.querySelectorAll(".permission-checkbox"))
                            .map(checkbox => [checkbox.dataset.permission, checkbox.checked])
                    )
                )
            }'>
            Créer le rôle
        </button>
    </div>
</div>
