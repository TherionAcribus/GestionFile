{% import '/admin/pagination.html' as pg %}
{% set lang_defaults = {'search': '', 'per_page': 25, 'sort': 'code', 'direction': 'asc'} %}
{{ pg.list_toolbar('languages', '/admin/languages/table', 'get', '#div_languages_table', lang_defaults, '', 'Rechercher (code, nom)…') }}
<div id="div_languages_table"
    hx-get="/admin/languages/table"
    hx-trigger="load, refresh_languages_table"
    hx-target="#div_languages_table"
    hx-swap="innerHTML"
    hx-vals='js:{"search": (document.getElementById("languages-search")||{}).value || "",
                "per_page": (document.getElementById("languages-per_page")||{}).value || "",
                "sort": (document.getElementById("languages-sort")||{}).value || "",
                "dir": (document.getElementById("languages-dir")||{}).value || ""}'>
</div>

<!-- Ajout nouvelle activité -->
<a class="btn btn-primary"
        hx-get="/admin/languages/add_form"
        hx-target="#div_add_language_form"
        hx-swap="innerHTML">
        Ajouter une langue
</a>    
<div id="div_add_language_form"></div>

<div id="order_languages"
    hx-get="/admin/languages/order_languages"
    hx-target="#order_languages"
    hx-trigger="load, refresh_languages_order"
    hx-swap="innerHTML">
</div>
